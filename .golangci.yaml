version: "2"
run:
  go: "1.25"
  timeout: 20s
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - misspell
    - nakedret
    - prealloc
    - revive
    - unconvert
    - unparam
  disable:
    - depguard
    - dupl
    - goconst
    - gocyclo
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      disable:
        - shadow
    misspell:
      locale: UK
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
  exclusions:
    paths:
      - generated
      - '.*\.pb\.go'
    rules:
      - path: '(.+)\.pb\.go'
        text: '.*'
      - path: generated
        text: '.*'
issues:
  exclude:
    - 'Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*printf?|os\.(Un)?Setenv|.*Disconnect). is not checked'
    - 'exported var \w+ should have comment or be unexported'
    - 'func name will be used as test\.Test.* by other packages'
    - 'Use of unsafe calls should be audited'
    - 'Subprocess launch(ed with variable|ing should be audited)'
    - G104
    - G107
    - '(Expect directory permissions to be 0750 or less|Expect file permissions to be 0600 or less)'
    - 'Potential file inclusion via variable'
    - '(possible misuse of unsafe.Pointer|should have signature)'
    - 'ineffective break statement. Did you mean to break out of the outer loop'
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    paths:
      - generated
      - '.*\.pb\.go'
